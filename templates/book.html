{% extends "layout.html" %}

{% block content %}

<div class="container mt-5">

    <div class="row justify-content-center">

        <div class="col-md-8">

            <div class="card shadow">

                <div class="card-header bg-primary text-white">
                    <h3 class="text-center">📦 Book Shipment</h3>
                </div>

                <div class="card-body">

                    <form action="{{ url_for('book') }}" method="POST">

                        <div class="mb-3">
                            <label class="form-label">Sender Name</label>
                            <input
                                type="text"
                                name="sender_name"
                                class="form-control"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Receiver Name</label>
                            <input
                                type="text"
                                name="receiver_name"
                                class="form-control"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Source</label>
                            <input
                                type="text"
                                name="source"
                                class="form-control"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Destination</label>
                            <input
                                type="text"
                                name="destination"
                                class="form-control"
                                required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Weight (kg)</label>
                            <input
                                type="number"
                                step="0.1"
                                name="weight"
                                class="form-control"
                                required>
                        </div>

                        <button type="submit" class="btn btn-success w-100">
                            📦 Book Shipment
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
