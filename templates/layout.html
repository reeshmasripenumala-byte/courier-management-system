<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courier Management System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="d-flex flex-column min-vh-100">

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">

        <div class="container">

            <a class="navbar-brand fw-bold" href="/">
                🚚 Courier Management
            </a>

            <button class="navbar-toggler"
                    type="button"
                    data-bs-toggle="collapse"
                    data-bs-target="#navbar">

                <span class="navbar-toggler-icon"></span>

            </button>

            <div class="collapse navbar-collapse" id="navbar">

                <ul class="navbar-nav ms-auto">

                    <li class="nav-item">
                        <a class="nav-link" href="/">🏠 Home</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/dashboard">📊 Dashboard</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/book">📦 Book</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/track">🔍 Track</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/shipments">📋 My Shipments</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/admin">👨‍💼 Admin</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/login">🔐 Login</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link" href="/register">📝 Register</a>
                    </li>

                    <li class="nav-item">
                        <a class="nav-link text-warning fw-bold" href="/logout">
                            🚪 Logout
                        </a>
                    </li>

                </ul>

            </div>

        </div>

    </nav>

    <!-- Main Content -->
    <main class="container mt-5 flex-grow-1">

        {% block content %}
        {% endblock %}

    </main>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3 mt-auto">
        <div class="container">
            <p class="mb-0">
                © 2026 Courier Management System | Developed using Flask & Bootstrap
            </p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
